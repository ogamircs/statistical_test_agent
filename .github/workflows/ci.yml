name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (syntax check)
        run: |
          python -m compileall -q src tests app.py

      - name: Smoke test (core analyzer path)
        run: |
          python - <<'PY'
          from pathlib import Path
          from src.statistics import ABTestAnalyzer

          data_path = Path("data/sample_ab_data.csv")
          analyzer = ABTestAnalyzer()
          analyzer.load_data(str(data_path))
          config = analyzer.auto_configure()
          assert config["success"] is True
          result = analyzer.run_ab_test()
          assert result.segment == "Overall"
          print("smoke_ok")
          PY

      - name: Pytest
        run: |
          pytest -q -ra
