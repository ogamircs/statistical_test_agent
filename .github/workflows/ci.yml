name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies (locked)
        run: |
          uv sync --frozen --extra dev

      - name: Lint (syntax check)
        run: |
          uv run python -m compileall -q src tests scripts app.py

      - name: Ruff
        run: |
          uv run ruff check .

      - name: Mypy
        run: |
          uv run mypy src app.py

      - name: Smoke test (core analyzer path)
        run: |
          uv run python - <<'PY'
          from pathlib import Path
          from src.statistics import ABTestAnalyzer

          data_path = Path("data/sample_ab_data.csv")
          analyzer = ABTestAnalyzer()
          analyzer.load_data(str(data_path))
          config = analyzer.auto_configure()
          assert config["success"] is True
          result = analyzer.run_ab_test()
          assert result.segment == "Overall"
          print("smoke_ok")
          PY

      - name: Pytest
        run: |
          uv run pytest -q -ra --cov=src --cov-fail-under=78

  spark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies (locked)
        run: |
          uv sync --frozen --extra dev --extra spark

      - name: Spark pytest
        env:
          SPARK_LOCAL_IP: 127.0.0.1
        run: |
          uv run pytest -q tests/test_pyspark_analyzer.py tests/test_parity_pandas_spark.py -ra
