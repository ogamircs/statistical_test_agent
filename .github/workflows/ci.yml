name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Lint (syntax check)
        run: |
          python -m compileall -q src tests app.py

      - name: Ruff
        run: |
          ruff check src tests app.py

      - name: Mypy (non-blocking)
        continue-on-error: true
        run: |
          mypy src

      - name: Smoke test (core analyzer path)
        run: |
          python - <<'PY'
          from pathlib import Path
          from src.statistics import ABTestAnalyzer

          data_path = Path("data/sample_ab_data.csv")
          analyzer = ABTestAnalyzer()
          analyzer.load_data(str(data_path))
          config = analyzer.auto_configure()
          assert config["success"] is True
          result = analyzer.run_ab_test()
          assert result.segment == "Overall"
          print("smoke_ok")
          PY

      - name: Pytest
        run: |
          pytest -q -ra

  spark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev,spark]"

      - name: Spark pytest
        env:
          SPARK_LOCAL_IP: 127.0.0.1
        run: |
          pytest -q tests/test_pyspark_analyzer.py tests/test_parity_pandas_spark.py -ra
