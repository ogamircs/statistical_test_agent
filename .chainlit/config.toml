[project]
# Name of your project
name = "A/B Testing Analysis Agent"
# Enable telemetry (set to false to disable)
enable_telemetry = false

[features]
# Enable prompt playground
prompt_playground = true
# Enable LaTeX rendering
latex = true

[features.spontaneous_file_upload]
# Enable file upload via drag and drop or clipboard
enabled = true
# Accepted file types (extensions and MIME types)
accept = [".csv", "text/csv", "application/vnd.ms-excel", "text/plain"]
# Maximum number of files per upload
max_files = 1
# Maximum file size in MB
max_size_mb = 50

[UI]
# Name of the app shown in the UI
name = "A/B Testing Agent"
# Description of the app
description = "An intelligent agent for analyzing A/B test experiments"
# Default theme (light or dark)
default_theme = "light"
# Show readme as a modal dialog
show_readme_as_default = false

[UI.theme]
# Theme customization
primary = "#1976D2"
background = "#FAFAFA"
paper = "#FFFFFF"

[meta]
generated_by = "Claude Code"
